<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDI Document Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=Playfair+Display:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#8b6914;--gold-lt:#c4a44a;--red:#c41e1e;--dark:#0d0d0d;--dark2:#141414;--dark3:#1c1c1c;--dark4:#242424;--border:#2a2a2a;--text:#e8e8e8;--muted:#888;--radius:6px}
body{font-family:'Source Serif 4',Georgia,serif;background:var(--dark);color:var(--text);min-height:100vh}
.btn{font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:1.5px;padding:9px 18px;border:none;border-radius:var(--radius);cursor:pointer;transition:all .18s}
.btn-primary{background:var(--red);color:#fff}.btn-primary:hover{background:#a01717}
.btn-secondary{background:var(--dark4);color:#ccc;border:1px solid #3a3a3a}.btn-secondary:hover{background:#333;color:#fff}
.btn-ghost{background:none;border:none;color:var(--muted);font-size:.78rem;cursor:pointer;padding:6px 10px;font-family:'Source Serif 4',serif;border-radius:var(--radius);transition:color .15s,background .15s}
.btn-ghost:hover{color:#fff;background:var(--dark4)}
.q-input{width:100%;background:var(--dark3);border:1px solid #333;border-radius:var(--radius);color:var(--text);padding:7px 10px;font-size:.83rem;font-family:'Source Serif 4',serif;outline:none;transition:border-color .18s}
.q-input:focus{border-color:var(--red)}
select.q-input option{background:var(--dark3)}
.q-rm{background:none;border:none;color:#555;cursor:pointer;font-size:.85rem;padding:4px 6px;border-radius:3px;transition:color .15s;flex-shrink:0}
.q-rm:hover{color:var(--red)}
.q-add-item{background:none;border:1px dashed #333;color:var(--muted);width:100%;padding:7px;border-radius:var(--radius);cursor:pointer;font-size:.78rem;margin-top:6px;transition:all .15s}
.q-add-item:hover{border-color:var(--gold-lt);color:var(--gold-lt)}
/* QUESTIONNAIRE */
.q-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 60% 40%,#1a0808 0%,var(--dark) 70%)}
.q-card{background:var(--dark2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:640px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.6)}
.q-header{background:var(--dark);border-bottom:2px solid var(--red);padding:18px 28px;display:flex;align-items:center;gap:14px}
.q-logo{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--red)}
.q-brand{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;color:#fff;letter-spacing:3px}
.q-sub{font-size:.68rem;color:var(--muted);letter-spacing:2px}
.q-progress{display:flex;padding:18px 28px 0;gap:0;position:relative}
.q-progress::after{content:'';position:absolute;top:28px;left:calc(28px + 14px);right:calc(28px + 14px);height:1px;background:var(--border);z-index:0}
.q-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:1}
.q-step-dot{width:28px;height:28px;border-radius:50%;background:var(--dark3);border:2px solid #333;display:flex;align-items:center;justify-content:center;font-size:.72rem;color:var(--muted);font-family:'Cinzel',serif}
.q-step.active .q-step-dot{background:var(--red);border-color:var(--red);color:#fff}
.q-step.done .q-step-dot{background:#166534;border-color:#166534;color:#fff}
.q-step-label{font-size:.62rem;color:var(--muted);letter-spacing:1px;text-align:center}
.q-step.active .q-step-label{color:var(--text)}
.q-body{padding:24px 28px;display:flex;flex-direction:column;gap:12px;min-height:300px}
.q-title{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;color:#fff;margin-bottom:2px}
.q-hint{font-size:.78rem;color:var(--muted);margin-bottom:4px}
.q-field{display:flex;flex-direction:column;gap:4px}
.q-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.q-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.q-grid3{display:grid;grid-template-columns:1fr .6fr .6fr;gap:10px}
.q-checkrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.q-check{display:flex;align-items:center;gap:5px;font-size:.8rem;color:var(--text);cursor:pointer;user-select:none;padding:4px 10px;border-radius:var(--radius);border:1px solid var(--border);transition:border-color .15s}
.q-check:hover{border-color:var(--gold-lt)}
.q-check input{accent-color:var(--red);cursor:pointer}
.q-items{display:flex;flex-direction:column;gap:6px}
.q-item-row{display:flex;align-items:center;gap:6px}
.q-item-dollar{color:var(--muted);font-size:.85rem;flex-shrink:0}
.q-done-msg{display:flex;align-items:flex-start;gap:10px;background:rgba(22,101,52,.15);border:1px solid #166534;border-radius:var(--radius);padding:12px;font-size:.8rem;color:#86efac;margin-top:8px}
.q-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 28px;border-top:1px solid var(--border);background:var(--dark)}
/* DASHBOARD */
.dash-shell{min-height:100vh;display:flex;flex-direction:column;background:var(--dark)}
.dash-header{background:var(--dark);border-bottom:2px solid var(--red);padding:14px 32px;display:flex;align-items:center;gap:16px}
.dash-logo{width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid var(--red)}
.dash-brand{display:flex;align-items:center;gap:12px}
.dash-title{font-family:'Cinzel',serif;font-size:1.2rem;font-weight:700;color:#fff;letter-spacing:3px}
.dash-sub{font-size:.65rem;color:var(--muted);letter-spacing:2px}
.dash-profile-pill{margin-left:auto;display:flex;align-items:center;gap:12px;background:var(--dark3);border:1px solid var(--border);border-radius:20px;padding:6px 14px}
.dash-profile-name{font-size:.82rem;color:#fff;font-weight:600}
.dash-profile-addr{font-size:.72rem;color:var(--muted)}
.dash-stats{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--dark2)}
.dash-stat{flex:1;text-align:center;padding:10px 16px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
.dash-stat:last-child{border-right:none}
.dash-stat-n{font-family:'Cinzel',serif;font-size:1.4rem;color:var(--gold-lt);font-weight:700}
.dash-stat span:last-child{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.dash-body{flex:1;overflow-y:auto;padding:28px 32px;display:flex;flex-direction:column;gap:28px}
.dash-cat-label{font-family:'Cinzel',serif;font-size:.72rem;color:var(--gold-lt);letter-spacing:3px;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:12px}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.dash-card{background:var(--dark2);border:1px solid var(--border);border-left:3px solid var(--card-color,var(--gold));border-radius:var(--radius);padding:14px 14px 12px;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:4px;transition:all .18s;position:relative;width:100%}
.dash-card:hover{background:var(--dark3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.dash-card-icon{font-size:1.4rem}
.dash-card-name{font-size:.83rem;font-weight:600;color:#fff;font-family:'Cinzel',serif}
.dash-card-desc{font-size:.68rem;color:var(--muted);line-height:1.4}
.dash-card-arrow{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--border);font-size:1rem;transition:color .15s}
.dash-card:hover .dash-card-arrow{color:var(--card-color,var(--gold))}
.dash-footer{padding:14px 32px;border-top:1px solid var(--border);background:var(--dark);font-size:.72rem;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
.gh-badge{color:var(--muted);text-decoration:none;font-size:.72rem;border:1px solid var(--border);border-radius:var(--radius);padding:4px 10px;transition:all .15s}
.gh-badge:hover{color:#fff;border-color:#555}
/* DOCUMENT PAGE */
.docpage-shell{min-height:100vh;display:flex;flex-direction:column;background:var(--dark)}
.docpage-topbar{background:var(--dark);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.docpage-doctitle{display:flex;align-items:center;gap:8px;font-family:'Cinzel',serif;font-size:.9rem;font-weight:700;color:#fff;letter-spacing:1.5px;flex:1;justify-content:center}
.docpage-icon{font-size:1.2rem}
.docpage-print{margin-left:auto}
.docpage-split{flex:1;display:grid;grid-template-columns:360px 1fr;overflow:hidden;min-height:0}
.docpage-form{border-right:1px solid var(--border);overflow-y:auto;padding:20px;background:var(--dark2)}
.docpage-preview{overflow-y:auto;padding:32px;background:#2a2a2a;display:flex;flex-direction:column;align-items:center}
/* FORM INTERNALS */
.form-sections{display:flex;flex-direction:column;gap:16px}
.form-section{background:var(--dark3);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.form-section-title{font-family:'Cinzel',serif;font-size:.62rem;color:var(--gold-lt);letter-spacing:2px;text-transform:uppercase;background:var(--dark4);border-bottom:1px solid var(--border);padding:7px 12px}
.form-section>*+*{border-top:1px solid rgba(255,255,255,.04)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0}
.form-row .form-field{border-right:1px solid rgba(255,255,255,.04)}
.form-row .form-field:last-child{border-right:none}
.form-field{padding:8px 12px}
.form-label{display:block;font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.form-textarea{resize:vertical;min-height:60px}
.quick-add{padding:8px 12px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.quick-add-label{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.quick-chip{font-size:.68rem;padding:3px 8px;background:var(--dark4);border:1px solid var(--border);border-radius:20px;cursor:pointer;color:var(--text);transition:all .15s}
.quick-chip:hover{border-color:var(--gold-lt);color:var(--gold-lt)}
.items-table{padding:8px 12px}
.items-header{display:flex;gap:6px;padding:4px 0;font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);margin-bottom:6px}
.item-row{display:flex;gap:6px;margin-bottom:5px;align-items:center}
.totals-preview{padding:8px 12px;font-size:.78rem;border-top:1px solid var(--border);color:var(--muted);display:flex;flex-direction:column;gap:3px}
.total-line{color:#fff;font-size:.9rem;border-top:1px solid var(--border);padding-top:4px;margin-top:2px}
.log-entry-list{padding:8px 12px;display:flex;flex-direction:column;gap:5px}
.log-entry-row{display:flex;gap:4px;align-items:center}
.log-row-num{font-size:.65rem;color:var(--muted);min-width:18px;text-align:right}
.log-cell{flex:1}
/* RECEIPT LAYOUT */
.receipt-wrap,.log-wrap{width:760px;background:#faf7f0;font-family:'Source Serif 4',Georgia,serif;color:#1a1a1a;position:relative;padding:40px 44px 36px;box-shadow:0 8px 40px rgba(0,0,0,.5);border:6px solid var(--gold);outline:2px solid var(--gold-lt);outline-offset:-10px}
.receipt-watermark{position:absolute;opacity:.05;width:300px;height:300px;object-fit:contain;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0}
.receipt-wrap>*:not(.receipt-watermark),.log-wrap>*:not(.receipt-watermark){position:relative;z-index:1}
.receipt-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.receipt-logo{width:70px;height:70px;object-fit:cover;border-radius:50%;border:2px solid var(--gold)}
.receipt-header-right{text-align:right}
.receipt-biz-name{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;color:#111;letter-spacing:2px}
.receipt-biz-sub{font-size:.72rem;color:#555;letter-spacing:1px}
.receipt-biz-detail{font-size:.7rem;color:#555}
.receipt-divider{height:3px;background:linear-gradient(to right,transparent,var(--gold) 10%,var(--gold) 90%,transparent);margin:8px 0}
.receipt-divider.thin{height:1px;background:linear-gradient(to right,transparent,var(--gold-lt) 10%,var(--gold-lt) 90%,transparent)}
.receipt-title-row{display:flex;justify-content:space-between;align-items:flex-end;margin:6px 0}
.receipt-doc-type{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:900;color:var(--red);letter-spacing:3px}
.receipt-doc-bdi{font-size:.62rem;color:var(--gold);letter-spacing:3px;font-family:'Cinzel',serif}
.receipt-meta{display:flex;flex-direction:column;gap:2px;text-align:right}
.receipt-meta-row{display:flex;gap:10px;justify-content:flex-end;font-size:.72rem;color:#555}
.receipt-meta-row strong{color:#111;font-size:.78rem}
.receipt-parties{display:flex;align-items:flex-start;gap:12px;margin:8px 0}
.receipt-party{flex:1}
.receipt-party-label{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:2px;color:var(--gold);margin-bottom:3px}
.receipt-party-name{font-weight:700;font-size:.88rem;color:#111}
.receipt-party-detail{font-size:.7rem;color:#555}
.receipt-party-arrow{color:var(--gold);font-size:1.2rem;margin-top:20px}
.receipt-dog-block{margin:6px 0}
.receipt-dog-label{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:2px;color:var(--gold);margin-bottom:5px}
.receipt-dog-grid{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid rgba(139,105,20,.3)}
.receipt-dog-cell{padding:4px 8px;border-right:1px solid rgba(139,105,20,.2);border-bottom:1px solid rgba(139,105,20,.2)}
.receipt-dog-cell:nth-child(4n){border-right:none}
.receipt-dog-key{display:block;font-size:.58rem;color:var(--gold);letter-spacing:1px;text-transform:uppercase}
.receipt-dog-val{font-size:.75rem;color:#111;font-weight:600}
.receipt-items{width:100%;border-collapse:collapse;font-size:.75rem;margin:4px 0}
.receipt-items th{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:1.5px;color:var(--gold);border-bottom:1px solid var(--gold-lt);padding:4px 8px;background:rgba(139,105,20,.06)}
.receipt-items td{padding:5px 8px;border-bottom:1px solid rgba(0,0,0,.06);color:#222}
.receipt-items tr:last-child td{border-bottom:none}
.item-desc{text-align:left;width:55%}
.item-num{text-align:right}
.receipt-totals{display:flex;flex-direction:column;gap:2px;margin:6px 0}
.receipt-total-row{display:flex;justify-content:space-between;font-size:.75rem;color:#555;padding:2px 8px}
.total-final{background:rgba(139,105,20,.1);border-top:1.5px solid var(--gold-lt);border-bottom:1.5px solid var(--gold-lt);font-weight:700;font-size:.88rem;color:#111;padding:5px 8px;margin-top:3px}
.receipt-notes{margin:8px 0;padding:8px;border:1px solid rgba(139,105,20,.25);border-radius:3px;font-size:.72rem;color:#444;background:rgba(139,105,20,.03)}
.receipt-footer{display:flex;align-items:flex-end;justify-content:space-between;margin-top:14px}
.receipt-sig-block{display:flex;flex-direction:column;gap:4px}
.receipt-sig-line{border-top:1px solid #555;width:200px;margin-bottom:3px}
.receipt-sig-name{font-weight:600;font-size:.8rem;color:#111}
.receipt-sig-title{font-size:.65rem;color:#777}
.receipt-stamp-block{display:flex;flex-direction:column;align-items:center;gap:4px}
.receipt-stamp{width:70px;height:70px;object-fit:contain;opacity:.85;border-radius:50%;border:2px solid var(--gold)}
.receipt-stamp-text{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:2px;color:var(--gold)}
.receipt-fine-print{text-align:center;font-size:.6rem;color:#999;margin-top:10px;padding-top:6px;border-top:1px solid rgba(0,0,0,.1);font-style:italic}
/* LOG LAYOUT */
.log-header{display:flex;align-items:center;gap:16px;margin-bottom:10px}
.log-logo{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
.log-header-center{flex:1;text-align:center}
.log-biz-name{font-family:'Cinzel',serif;font-size:.85rem;font-weight:700;letter-spacing:2px;color:#111}
.log-doc-type{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:900;color:var(--red);letter-spacing:3px}
.log-bdi-tag{font-size:.58rem;letter-spacing:3px;color:var(--gold);font-family:'Cinzel',serif}
.log-meta{display:flex;flex-direction:column;gap:2px}
.log-meta-row{display:flex;gap:8px;font-size:.7rem;color:#555;justify-content:flex-end}
.log-meta-row strong{color:#111}
.log-keeper{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;margin:6px 0;font-size:.72rem}
.log-keeper-item{display:flex;gap:6px;align-items:baseline}
.log-keeper-label{font-size:.6rem;color:var(--gold);text-transform:uppercase;letter-spacing:1px;min-width:80px;font-family:'Cinzel',serif}
.log-keeper-val{color:#111;font-weight:600}
.log-table-title{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:2px;color:var(--gold);text-align:center;margin:8px 0 4px}
.log-table{width:100%;border-collapse:collapse;font-size:.72rem}
.log-table th{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:1px;color:var(--gold);background:rgba(139,105,20,.1);border:1px solid rgba(139,105,20,.3);padding:5px 6px;text-align:left}
.log-table td{border:1px solid rgba(0,0,0,.1);padding:6px 6px;color:#222;vertical-align:middle}
.log-table tr:nth-child(even) td{background:rgba(0,0,0,.025)}
.log-empty-row td{height:26px}
.log-num{color:var(--gold);font-size:.65rem;text-align:center;width:5%}
.log-notes{margin:10px 0;font-size:.72rem}
.log-notes-box{min-height:40px;margin-top:4px;border-bottom:1px solid rgba(0,0,0,.2);color:#333;padding:4px 0}
/* CERTIFICATE */
.cert-wrap{width:900px;background:#f9f5ec;position:relative;font-family:'Source Serif 4',serif;box-shadow:0 8px 40px rgba(0,0,0,.6)}
.cert-wrap::before{content:'';position:absolute;inset:8px;border:2px solid #8b6914;pointer-events:none;z-index:2}
.cert-wrap::after{content:'';position:absolute;inset:4px;border:6px solid #8b6914;pointer-events:none;z-index:2}
.cert-border-inner{position:absolute;inset:16px;border:1px solid #c4a44a;pointer-events:none;z-index:2}
.cert-body{padding:40px 44px 36px;position:relative;z-index:1}
.cert-header{text-align:center;margin-bottom:6px}
.cert-company-name{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:900;letter-spacing:4px;color:#1a1a1a;text-transform:uppercase}
.cert-founded{font-size:.65rem;letter-spacing:3px;color:#555;font-family:'Cinzel',serif;margin-top:2px}
.cert-title-block{margin:6px 0 10px}
.cert-title{font-family:'IM Fell English',serif;font-size:2.6rem;font-style:italic;color:#c41e1e;line-height:1;text-align:center}
.cert-subtitle{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:4px;color:#333;text-align:center;margin-top:2px}
.cert-divider{height:3px;background:linear-gradient(to right,transparent,#8b6914 20%,#8b6914 80%,transparent);margin:8px 0}
.cert-divider-thin{height:1px;background:linear-gradient(to right,transparent,#8b6914 20%,#8b6914 80%,transparent);margin:4px 0}
.cert-dog-info{display:grid;grid-template-columns:1fr 1fr;gap:0 24px;margin:10px 0 12px;font-size:.78rem}
.cert-dog-info-row{display:flex;gap:6px;padding:2px 0;border-bottom:1px solid rgba(139,105,20,.2)}
.cert-dog-info-label{font-weight:600;color:#444;min-width:90px;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px}
.cert-dog-info-value{color:#111;font-size:.8rem}
.cert-dog-name{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;color:#1a1a1a;text-align:center;margin-bottom:6px;letter-spacing:1px}
.ped-col-label{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:2px;text-transform:uppercase;color:#8b6914;text-align:center;padding:2px 0 4px;border-bottom:1px solid #c4a44a}
.ped-cell{border-bottom:1px solid rgba(139,105,20,.35);border-right:1px solid rgba(139,105,20,.35);padding:5px 7px;display:flex;flex-direction:column;justify-content:center;position:relative}
.ped-cell-label{font-size:.55rem;color:#8b6914;text-transform:uppercase;letter-spacing:1px;font-family:'Cinzel',serif}
.ped-cell-name{font-weight:600;color:#111;font-size:.72rem;line-height:1.3;font-family:'Playfair Display',serif}
.ped-cell-info{font-size:.62rem;color:#555;margin-top:1px}
.cert-stamp{position:absolute;opacity:.08;width:260px;height:260px;object-fit:contain;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0}
.cert-footer{margin-top:14px;display:grid;grid-template-columns:100px 1fr 100px;align-items:flex-end;gap:12px}
.cert-footer-stamp{width:90px;height:90px;object-fit:contain;opacity:.85}
.cert-footer-center{text-align:center}
.cert-footer-seal-text{font-size:.62rem;color:#555;font-style:italic;line-height:1.5;margin-bottom:6px}
.cert-sig-line{border-top:1px solid #8b6914;padding-top:4px;font-family:'IM Fell English',serif;font-style:italic;font-size:.85rem;color:#333;text-align:center}
.cert-sig-role{font-size:.6rem;color:#777;letter-spacing:1.5px;text-transform:uppercase;font-family:'Source Serif 4',serif;font-style:normal;text-align:center}

.cert-reg-block .bdi-label{font-family:'Cinzel',serif;font-size:.85rem;font-weight:700;color:#c41e1e;letter-spacing:3px;display:block}
/* PRINT */
@media print{
  body{background:white!important}
  .docpage-topbar,.docpage-form,#no-print{display:none!important}
  .docpage-shell{min-height:unset}
  .docpage-split{grid-template-columns:1fr!important}
  .docpage-preview{padding:0!important;background:white!important;overflow:visible!important}
  .receipt-wrap,.log-wrap{box-shadow:none!important;width:100%!important;page-break-inside:avoid}
  .cert-wrap{box-shadow:none!important;width:100%!important}
}
/* RESPONSIVE */
@media(max-width:900px){
  .docpage-split{grid-template-columns:1fr}
  .docpage-form{max-height:50vh}
  .receipt-wrap,.log-wrap{width:100%}
  .dash-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';

/* ═══════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════ */
const LOGO = './bdi-logo.jpeg';

const CATEGORIES = ['Sales & Revenue','Purchases','Services','Food Logs','Medical & Health','Finance','Certificates'];

const DOCS = [
  {id:'sales-receipt',name:'Sales Receipt',icon:'🧾',category:'Sales & Revenue',color:'#16a34a',layout:'receipt',prefix:'SR',recipientLabel:'SOLD TO',description:'Customer purchase receipt for goods or services sold'},
  {id:'invoice',name:'Invoice',icon:'📄',category:'Sales & Revenue',color:'#15803d',layout:'receipt',prefix:'INV',recipientLabel:'BILLED TO',description:'Formal billing invoice for clients',isInvoice:true},
  {id:'puppy-sale',name:'Puppy Sale Receipt',icon:'🐶',category:'Sales & Revenue',color:'#166534',layout:'receipt',prefix:'PS',recipientLabel:'PURCHASED BY',description:'Official puppy sale document with dog details',dogFields:true},
  {id:'breeding-service',name:'Breeding Service',icon:'🐕',category:'Sales & Revenue',color:'#14532d',layout:'receipt',prefix:'BS',recipientLabel:'SERVICE PROVIDED TO',description:'Stud service and breeding contract receipt',dogFields:true},

  {id:'petty-cash',name:'Petty Cash Receipt',icon:'💵',category:'Purchases',color:'#a16207',layout:'receipt',prefix:'PC',recipientLabel:'VENDOR',description:'Small cash transaction record',isPurchase:true},
  {id:'pet-food',name:'Pet Food Receipt',icon:'🛍',category:'Purchases',color:'#92400e',layout:'receipt',prefix:'PF',recipientLabel:'PURCHASED FROM',description:'Pet food and supply purchase receipt',isPurchase:true},
  {id:'service-receipt',name:'Service Receipt',icon:'🔧',category:'Services',color:'#7c3aed',layout:'receipt',prefix:'SV',recipientLabel:'SERVICE PROVIDED TO',description:'Service completion receipt'},
  {id:'grooming',name:'Grooming Receipt',icon:'✂️',category:'Services',color:'#6d28d9',layout:'receipt',prefix:'GR',recipientLabel:'GROOMED FOR',description:'Professional grooming services',dogFields:true},
  {id:'boarding',name:'Boarding Receipt',icon:'🏠',category:'Services',color:'#5b21b6',layout:'receipt',prefix:'BO',recipientLabel:'BOARDED FOR',description:'Boarding and daycare services',dogFields:true,dateRange:true},
  {id:'food-consumption',name:'Food Consumption Log',icon:'🍖',category:'Food Logs',color:'#ea580c',layout:'log',prefix:'FC',description:'Daily feeding and food consumption records',dogFields:true,logColumns:['Dog Name / ID','AM Feed','PM Feed','Water Intake','Notes'],logColumnWidths:['22%','16%','16%','16%','30%']},
  {id:'feed-supplement',name:'Feed / Supplement Log',icon:'💊',category:'Food Logs',color:'#c2410c',layout:'log',prefix:'FS',description:'Nutritional supplement and feeding tracker',dogFields:true,logColumns:['Dog Name / ID','Supplement / Food','Amount','Time Given','Notes'],logColumnWidths:['22%','26%','14%','14%','24%']},
  {id:'meal-expense',name:'Meal Expense Report',icon:'🍽',category:'Food Logs',color:'#9a3412',layout:'receipt',prefix:'ME',recipientLabel:'BUSINESS PURPOSE / GUESTS',description:'Business meal and entertainment expenses'},
  {id:'vet-receipt',name:'Vet Receipt',icon:'🏥',category:'Medical & Health',color:'#0d9488',layout:'receipt',prefix:'VR',recipientLabel:'CLINIC / PROVIDER',description:'Veterinary visit and treatment record',dogFields:true,isPurchase:true},
  {id:'vaccination',name:'Vaccination Record',icon:'💉',category:'Medical & Health',color:'#0f766e',layout:'log',prefix:'VAC',description:'Official vaccination tracking document',dogFields:true,logColumns:['Dog Name / ID','Vaccine Type','Date Given','Next Due Date','Lot # / Vet'],logColumnWidths:['20%','22%','16%','16%','26%']},
  {id:'expense-report',name:'Expense Report',icon:'📊',category:'Finance',color:'#1d4ed8',layout:'receipt',prefix:'ER',recipientLabel:'SUBMITTED BY',description:'Business expense tracking and reimbursement',isPurchase:true},
  {id:'delivery',name:'Delivery Receipt',icon:'📦',category:'Finance',color:'#1e40af',layout:'receipt',prefix:'DL',recipientLabel:'DELIVERED TO',description:'Proof of delivery acknowledgment'},
  {id:'donation',name:'Donation Receipt',icon:'❤️',category:'Finance',color:'#dc2626',layout:'receipt',prefix:'DN',recipientLabel:'DONOR',description:'Charitable donation acknowledgment',isDonation:true},
  {id:'pedigree',name:'Pedigree Certificate',icon:'📜',category:'Certificates',color:'#78716c',layout:'cert',prefix:'PED',description:'Heritage pedigree certificate (AKC/UKC style)'},
];

/* ═══════════════════════════════════════════════════
   PROFILE (localStorage)
═══════════════════════════════════════════════════ */
const PROFILE_DEFAULTS = {
  firstName:'John',lastName:'Doe',businessName:'Bulldog Inc.',title:'Breeder & Owner',estYear:'2020',
  street:'123 Kennel Lane',city:'Atlanta',state:'GA',zip:'30301',
  phone:'(404) 555-0100',email:'info@bulldoginc.com',website:'www.bulldoginc.com',
  taxId:'',licenseNum:'',defaultBreed:'French Bulldog',taxRate:'0',
  paymentMethods:['Cash','Zelle','Venmo','Credit Card'],
  commonItems:[
    {name:'French Bulldog Puppy',price:'3500'},
    {name:'Stud Service Fee',price:'1500'},
    {name:'Royal Canin Bulldog Adult (17.6 lb)',price:'65'},
    {name:'Veterinary Exam',price:'75'},
    {name:'Vaccination (Combo)',price:'45'},
  ],
  completed:false
};

function loadProfile(){
  try{ const s=localStorage.getItem('bdi-profile'); return s?{...PROFILE_DEFAULTS,...JSON.parse(s)}:{...PROFILE_DEFAULTS}; }
  catch(e){ return {...PROFILE_DEFAULTS}; }
}
function saveProfile(p){ localStorage.setItem('bdi-profile',JSON.stringify(p)); }

function nextDocNumber(prefix){
  const key='bdi-counter-'+prefix;
  const n=parseInt(localStorage.getItem(key)||'0',10)+1;
  localStorage.setItem(key,String(n));
  return 'BDI-'+prefix+'-'+new Date().getFullYear()+'-'+String(n).padStart(4,'0');
}

/* ═══════════════════════════════════════════════════
   APP STATE
═══════════════════════════════════════════════════ */
const S = {
  page:'dashboard',
  qStep:0,
  qLocal:null,
  profile:loadProfile(),
  docId:null,
  doc:null,
  data:null,
};

/* ═══════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════ */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d){
  if(!d) return '—';
  const dt=new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
}
function fmtMoney(n){ return '$'+parseFloat(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function getDoc(id){ return DOCS.find(d=>d.id===id); }

function buildInitialState(doc, profile){
  const today=new Date().toISOString().split('T')[0];
  const fullName=`${profile.firstName||''} ${profile.lastName||''}`.trim();
  return {
    docNumber:nextDocNumber(doc.prefix), date:today, dateEnd:today,
    issuerName:profile.businessName||'Bulldog Inc.',
    issuerTitle:profile.title||'',
    issuerAddress:profile.street||'',
    issuerCityStateZip:`${profile.city||''}, ${profile.state||''} ${profile.zip||''}`,
    issuerPhone:profile.phone||'',
    issuerEmail:profile.email||'',
    issuerWebsite:profile.website||'',
    issuerTaxId:profile.taxId||'',
    issuerLicense:profile.licenseNum||'',
    recipientName:'',recipientAddress:'',recipientPhone:'',recipientEmail:'',
    dogName:'',dogBreed:profile.defaultBreed||'French Bulldog',dogDob:'',dogColor:'',dogSex:'Male',dogRegNum:'',dogMicrochip:'',
    items:profile.commonItems&&profile.commonItems.length
      ?[{description:profile.commonItems[0].name,qty:'1',price:profile.commonItems[0].price}]
      :[{description:'',qty:'1',price:''}],
    taxRate:profile.taxRate||'0', discount:'0',
    logDate:today, logPeriod:'Daily',
    logEntries:Array(5).fill(null).map(()=>({c0:'',c1:'',c2:'',c3:'',c4:''})),
    paymentMethod:profile.paymentMethods&&profile.paymentMethods[0]||'Cash',
    notes:'', terms:doc.isInvoice?'Payment due within 30 days.':'',
    signatureName:fullName, signatureTitle:profile.title||'Owner',
    certType:'Heritage Pedigree', certNumber:nextDocNumber('PED'),
    dogName2:'',regNumber:'',breed:profile.defaultBreed||'French Bulldog',
    sex:'Male',color:'',dob:'',breeder:fullName,owner:'',
    sire:{name:'',reg:'',color:''},dam:{name:'',reg:'',color:''},
    siresSire:{name:'',reg:'',color:''},siresDam:{name:'',reg:'',color:''},
    damsSire:{name:'',reg:'',color:''},damsDam:{name:'',reg:'',color:''},
    ssss:{name:'',reg:''},sssd:{name:'',reg:''},ssds:{name:'',reg:''},ssdd:{name:'',reg:''},
    sdss:{name:'',reg:''},sdsd:{name:'',reg:''},sdds:{name:'',reg:''},sddd:{name:'',reg:''},
    g4ss1:'',g4ss2:'',g4ss3:'',g4ss4:'',g4ss5:'',g4ss6:'',g4ss7:'',g4ss8:'',
    g4ds1:'',g4ds2:'',g4ds3:'',g4ds4:'',g4ds5:'',g4ds6:'',g4ds7:'',g4ds8:'',
  };
}

function calcTotals(data){
  const subtotal=(data.items||[]).reduce((s,it)=>s+(parseFloat(it.qty||1)*parseFloat(it.price||0)),0);
  const taxAmt=subtotal*(parseFloat(data.taxRate||0)/100);
  const discount=parseFloat(data.discount||0);
  const total=subtotal+taxAmt-discount;
  return {subtotal,taxAmt,discount,total};
}

/* ═══════════════════════════════════════════════════
   RENDER ENTRY POINT
═══════════════════════════════════════════════════ */
function render(){
  const app=document.getElementById('app');
  if(!S.profile.completed){
    app.innerHTML=renderQuestionnaire();
  } else if(S.page==='doc'&&S.docId){
    app.innerHTML=renderDocumentPage();
    attachDocPageEvents();
  } else {
    app.innerHTML=renderDashboard();
  }
}

function updatePreview(){
  const area=document.getElementById('preview-area');
  if(!area) return;
  area.innerHTML=buildPreviewHTML();
}

/* ═══════════════════════════════════════════════════
   QUESTIONNAIRE
═══════════════════════════════════════════════════ */
function renderQuestionnaire(){
  const L=S.qLocal||(S.qLocal={...S.profile});
  const steps=['Identity','Contact','Business','Quick Items'];
  const dots=steps.map((s,i)=>{
    const cls=i===S.qStep?'active':i<S.qStep?'done':'';
    const dot=i<S.qStep?'✓':i+1;
    return `<div class="q-step ${cls}"><div class="q-step-dot">${dot}</div><div class="q-step-label">${s}</div></div>`;
  }).join('');

  let body='';
  if(S.qStep===0){
    body=`
      <h2 class="q-title">Who are you?</h2>
      <p class="q-hint">This prefills every document you generate — takes 30 seconds.</p>
      <div class="q-grid2">
        ${qField('First Name *','firstName',L.firstName,'John')}
        ${qField('Last Name *','lastName',L.lastName,'Doe')}
      </div>
      ${qField('Business / Kennel Name *','businessName',L.businessName,'Bulldog Inc.')}
      <div class="q-grid2">
        ${qField('Your Title / Role','title',L.title,'Breeder & Owner')}
        ${qField('Year Established','estYear',L.estYear,'2020')}
      </div>`;
  } else if(S.qStep===1){
    body=`
      <h2 class="q-title">Contact Information</h2>
      <p class="q-hint">Appears on all document headers automatically.</p>
      ${qField('Street Address','street',L.street,'123 Kennel Lane')}
      <div class="q-grid3">
        ${qField('City','city',L.city,'Atlanta')}
        ${qField('State','state',L.state,'GA')}
        ${qField('ZIP','zip',L.zip,'30301')}
      </div>
      <div class="q-grid2">
        ${qField('Phone','phone',L.phone,'(404) 555-0100')}
        ${qField('Email','email',L.email,'info@bulldoginc.com')}
      </div>
      ${qField('Website (optional)','website',L.website,'www.bulldoginc.com')}`;
  } else if(S.qStep===2){
    const pms=['Cash','Zelle','Venmo','PayPal','Credit Card','Check','Wire Transfer'];
    const checks=pms.map(pm=>`
      <label class="q-check">
        <input type="checkbox" onchange="BDI.togglePM('${pm}',this.checked)" ${(L.paymentMethods||[]).includes(pm)?'checked':''}>
        ${pm}
      </label>`).join('');
    body=`
      <h2 class="q-title">Business Details</h2>
      <p class="q-hint">Used on invoices and official receipts.</p>
      <div class="q-grid2">
        ${qField('Tax ID / EIN (optional)','taxId',L.taxId,'12-3456789')}
        ${qField('License # (optional)','licenseNum',L.licenseNum,'USDA-12345')}
      </div>
      <div class="q-grid2">
        ${qField('Default Breed','defaultBreed',L.defaultBreed,'French Bulldog')}
        ${qField('Default Tax Rate %','taxRate',L.taxRate,'0','number')}
      </div>
      <label class="q-label" style="margin-top:12px">Accepted Payment Methods</label>
      <div class="q-checkrow">${checks}</div>`;
  } else {
    const items=(L.commonItems||[]).map((it,i)=>`
      <div class="q-item-row">
        <input class="q-input" value="${esc(it.name)}" placeholder="Item / service name" style="flex:3"
          oninput="BDI.updateQItem(${i},'name',this.value)">
        <span class="q-item-dollar">$</span>
        <input class="q-input" value="${esc(it.price)}" placeholder="Price" type="number" style="flex:1"
          oninput="BDI.updateQItem(${i},'price',this.value)">
        <button class="q-rm" onclick="BDI.removeQItem(${i})">✕</button>
      </div>`).join('');
    body=`
      <h2 class="q-title">Your Common Items</h2>
      <p class="q-hint">These appear as quick-add buttons in every document form. Edit anytime.</p>
      <div class="q-items" id="q-items-list">${items}</div>
      <button class="q-add-item" onclick="BDI.addQItem()">+ Add Item</button>
      <div class="q-done-msg"><span>🎉</span><span>After this, every document form will be pre-filled with your business info. You can edit any field before printing.</span></div>`;
  }

  const backBtn=S.qStep>0?`<button class="btn btn-secondary" onclick="BDI.qBack()">← Back</button>`:`<div></div>`;
  const nextLabel=S.qStep===steps.length-1?'🚀 Launch Generator':'Continue →';

  return `
    <div class="q-shell">
      <div class="q-card">
        <div class="q-header">
          <img src="${LOGO}" alt="BDI" class="q-logo">
          <div>
            <div class="q-brand">BULLDOG INC.</div>
            <div class="q-sub">Document Generator Setup</div>
          </div>
        </div>
        <div class="q-progress">${dots}</div>
        <div class="q-body">${body}</div>
        <div class="q-nav">
          ${backBtn}
          <button class="btn btn-primary" onclick="BDI.qNext()">${nextLabel}</button>
        </div>
      </div>
    </div>`;
}

function qField(label,key,value,placeholder,type='text'){
  return `<div class="q-field">
    <label class="q-label">${label}</label>
    <input class="q-input" type="${type}" value="${esc(value)}" placeholder="${placeholder}"
      oninput="BDI.updateQL('${key}',this.value)">
  </div>`;
}

/* ═══════════════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════════════ */
function renderDashboard(){
  const p=S.profile;
  const byCategory={};
  CATEGORIES.forEach(c=>{byCategory[c]=[];});
  DOCS.forEach(d=>{if(byCategory[d.category]) byCategory[d.category].push(d);});

  const categories=CATEGORIES.map(cat=>{
    const docs=byCategory[cat];
    if(!docs||!docs.length) return '';
    const cards=docs.map(doc=>`
      <button class="dash-card" style="--card-color:${doc.color}" onclick="BDI.openDoc('${doc.id}')">
        <span class="dash-card-icon">${doc.icon}</span>
        <span class="dash-card-name">${esc(doc.name)}</span>
        <span class="dash-card-desc">${esc(doc.description)}</span>
        <span class="dash-card-arrow">→</span>
      </button>`).join('');
    return `<div class="dash-category"><h2 class="dash-cat-label">${cat}</h2><div class="dash-grid">${cards}</div></div>`;
  }).join('');

  return `
    <div class="dash-shell">
      <header class="dash-header">
        <div class="dash-brand">
          <img src="${LOGO}" alt="BDI" class="dash-logo">
          <div>
            <div class="dash-title">BULLDOG INC.</div>
            <div class="dash-sub">Document Generator</div>
          </div>
        </div>
        <div class="dash-profile-pill">
          <span class="dash-profile-name">${esc(p.businessName)}</span>
          <span class="dash-profile-addr">${esc(p.city)}, ${esc(p.state)}</span>
          <button class="btn-ghost" onclick="BDI.editProfile()">Edit Profile</button>
        </div>
      </header>
      <div class="dash-stats">
        <div class="dash-stat"><span class="dash-stat-n">${DOCS.length}</span><span>Document Types</span></div>
        <div class="dash-stat"><span class="dash-stat-n">${CATEGORIES.length}</span><span>Categories</span></div>
        <div class="dash-stat"><span class="dash-stat-n">∞</span><span>Documents</span></div>
        <div class="dash-stat"><span class="dash-stat-n">PDF</span><span>Print Ready</span></div>
      </div>
      <div class="dash-body">${categories}</div>
      <footer class="dash-footer">
        <span>Bulldog Inc. (BDI) · All documents print as PDF via browser print dialog</span>
        <a class="gh-badge" href="https://github.com/dwarfdeve/bulldog-docs" target="_blank" rel="noreferrer">📁 GitHub Repo</a>
      </footer>
    </div>`;
}

/* ═══════════════════════════════════════════════════
   DOCUMENT PAGE
═══════════════════════════════════════════════════ */
function renderDocumentPage(){
  const doc=S.doc;
  const data=S.data;
  const profile=S.profile;

  return `
    <div class="docpage-shell">
      <div class="docpage-topbar" id="no-print">
        <button class="btn-ghost" onclick="BDI.backToDashboard()">← Dashboard</button>
        <div class="docpage-doctitle">
          <span class="docpage-icon">${doc.icon}</span>
          <span>${esc(doc.name)}</span>
        </div>
        <button class="btn btn-primary docpage-print" onclick="window.print()">🖨 Print / Save PDF</button>
      </div>
      <div class="docpage-split">
        <aside class="docpage-form" id="no-print">
          ${buildFormHTML()}
        </aside>
        <main class="docpage-preview">
          <div id="preview-area">${buildPreviewHTML()}</div>
        </main>
      </div>
    </div>`;
}

function buildFormHTML(){
  const doc=S.doc, data=S.data, profile=S.profile;
  if(doc.layout==='cert') return buildCertFormHTML();

  const payMethods=(profile.paymentMethods&&profile.paymentMethods.length)
    ?profile.paymentMethods:['Cash','Zelle','Venmo','Credit Card'];

  let html=`<div class="form-sections">`;

  // Document header
  html+=`<div class="form-section"><div class="form-section-title">Document</div>
    <div class="form-row">
      ${fField('Document #','docNumber',data.docNumber)}
      ${fField('Date','date',data.date,'','date')}
    </div>`;
  if(doc.dateRange) html+=`<div class="form-row">
    ${fField('Check-in','date',data.date,'','date')}
    ${fField('Check-out','dateEnd',data.dateEnd,'','date')}
  </div>`;
  html+=`</div>`;

  // Issuer
  html+=`<div class="form-section"><div class="form-section-title">Your Info (pre-filled)</div>
    ${fField('Business Name','issuerName',data.issuerName)}
    <div class="form-row">${fField('Phone','issuerPhone',data.issuerPhone)}${fField('Email','issuerEmail',data.issuerEmail)}</div>
    ${fField('Address','issuerAddress',data.issuerAddress)}
    ${fField('City, State ZIP','issuerCityStateZip',data.issuerCityStateZip)}
    ${data.issuerTaxId?fField('Tax ID','issuerTaxId',data.issuerTaxId):''}
  </div>`;

  // Recipient
  html+=`<div class="form-section"><div class="form-section-title">${esc(doc.recipientLabel||'OTHER PARTY')}</div>
    ${fField('Name / Company','recipientName',data.recipientName,'Customer or Vendor name')}
    ${fField('Address','recipientAddress',data.recipientAddress,'Street, City, State')}
    <div class="form-row">${fField('Phone','recipientPhone',data.recipientPhone)}${fField('Email','recipientEmail',data.recipientEmail)}</div>
  </div>`;

  // Dog fields
  if(doc.dogFields){
    html+=`<div class="form-section"><div class="form-section-title">Dog / Animal Info</div>
      <div class="form-row">${fField('Dog Name','dogName',data.dogName,'Registered name')}${fField('Breed','dogBreed',data.dogBreed,'French Bulldog')}</div>
      <div class="form-row">${fField('Date of Birth','dogDob',data.dogDob,'','date')}${fSelect('Sex','dogSex',data.dogSex,['Male','Female'])}</div>
      <div class="form-row">${fField('Color / Markings','dogColor',data.dogColor,'Blue Merle')}${fField('Reg / ID #','dogRegNum',data.dogRegNum,'BDI-000001')}</div>
      ${(doc.id==='puppy-sale'||doc.id==='breeding-service')?fField('Microchip #','dogMicrochip',data.dogMicrochip):''}
    </div>`;
  }

  // Line items
  if(doc.layout==='receipt'){
    const quickChips=(profile.commonItems&&profile.commonItems.length)
      ?`<div class="quick-add"><span class="quick-add-label">Quick add:</span>${
          profile.commonItems.map((it,i)=>`<button class="quick-chip" onclick="BDI.addItem('${esc(it.name)}','${esc(it.price)}')">${esc(it.name)}</button>`).join('')
        }</div>`:''
    const itemRows=(data.items||[]).map((it,i)=>`
      <div class="item-row">
        <input class="q-input" style="flex:3" value="${esc(it.description)}" placeholder="Item / service"
          oninput="BDI.updateItem(${i},'description',this.value)">
        <input class="q-input" style="flex:1" value="${esc(it.qty)}" type="number" min="1"
          oninput="BDI.updateItem(${i},'qty',this.value)">
        <input class="q-input" style="flex:1" value="${esc(it.price)}" type="number" step="0.01" placeholder="0.00"
          oninput="BDI.updateItem(${i},'price',this.value)">
        <button class="q-rm" onclick="BDI.removeItem(${i})">✕</button>
      </div>`).join('');
    const t=calcTotals(data);
    html+=`<div class="form-section"><div class="form-section-title">Line Items</div>
      ${quickChips}
      <div class="items-table">
        <div class="items-header">
          <span style="flex:3">Description</span><span style="flex:1">Qty</span>
          <span style="flex:1">Price</span><span style="width:28px"></span>
        </div>
        <div id="items-list">${itemRows}</div>
        <button class="q-add-item" onclick="BDI.addItem()">+ Add Row</button>
      </div>
      <div class="form-row">${fField('Tax Rate %','taxRate',data.taxRate,'','number')}${fField('Discount ($)','discount',data.discount,'','number')}</div>
      <div class="totals-preview" id="totals-preview">
        <div>Subtotal: <strong>${fmtMoney(t.subtotal)}</strong></div>
        ${parseFloat(data.taxRate)>0?`<div>Tax: <strong>${fmtMoney(t.taxAmt)}</strong></div>`:''}
        ${parseFloat(data.discount)>0?`<div>Discount: <strong>-${fmtMoney(t.discount)}</strong></div>`:''}
        <div class="total-line">TOTAL: <strong>${fmtMoney(t.total)}</strong></div>
      </div>
    </div>`;
  }

  // Log entries
  if(doc.layout==='log'){
    const logRows=(data.logEntries||[]).map((row,i)=>`
      <div class="log-entry-row">
        <span class="log-row-num">${i+1}</span>
        ${[0,1,2,3,4].map(c=>`<input class="q-input log-cell" value="${esc(row['c'+c]||'')}"
          placeholder="${esc((doc.logColumns||[])[c]||'')}"
          oninput="BDI.updateLogEntry(${i},'c${c}',this.value)">`).join('')}
        <button class="q-rm" onclick="BDI.removeLogRow(${i})">✕</button>
      </div>`).join('');
    html+=`<div class="form-section"><div class="form-section-title">Log Entries</div>
      <div class="form-row">${fField('Log Date','logDate',data.logDate,'','date')}${fSelect('Period','logPeriod',data.logPeriod,['Daily','Weekly','Monthly','Custom'])}</div>
      <div class="log-entry-list" id="log-list">${logRows}</div>
      <button class="q-add-item" style="margin:0 12px 8px;width:calc(100% - 24px)" onclick="BDI.addLogRow()">+ Add Row</button>
    </div>`;
  }

  // Footer
  html+=`<div class="form-section"><div class="form-section-title">Footer &amp; Signature</div>
    ${fSelect('Payment Method','paymentMethod',data.paymentMethod,payMethods)}
    ${fTextarea('Notes','notes',data.notes,'Any additional notes...')}
    ${doc.isInvoice?fTextarea('Terms','terms',data.terms,'Payment terms...'):''}
    <div class="form-row">${fField('Signatory Name','signatureName',data.signatureName)}${fField('Signatory Title','signatureTitle',data.signatureTitle)}</div>
  </div>`;

  html+=`</div>`;
  return html;
}

function fField(label,key,value,placeholder,type='text'){
  return `<div class="form-field">
    <label class="form-label">${esc(label)}</label>
    <input class="q-input" type="${type}" value="${esc(value||'')}" placeholder="${esc(placeholder||'')}"
      data-key="${esc(key)}" oninput="BDI.onFieldInput(this)">
  </div>`;
}
function fSelect(label,key,value,options){
  const opts=options.map(o=>`<option${value===o?' selected':''}>${esc(o)}</option>`).join('');
  return `<div class="form-field">
    <label class="form-label">${esc(label)}</label>
    <select class="q-input" data-key="${esc(key)}" onchange="BDI.onFieldInput(this)">${opts}</select>
  </div>`;
}
function fTextarea(label,key,value,placeholder){
  return `<div class="form-field">
    <label class="form-label">${esc(label)}</label>
    <textarea class="q-input form-textarea" rows="3" data-key="${esc(key)}"
      placeholder="${esc(placeholder||'')}" oninput="BDI.onFieldInput(this)">${esc(value||'')}</textarea>
  </div>`;
}

            <span class="bdi-label">BDI</span>
            <span>${esc(data.certType||'')}</span><br>
            ${data.certNumber?`<span style="font-weight:600">${esc(data.certNumber)}</span><br>`:''}
            <span style="font-family:Cinzel,serif;font-size:.6rem;letter-spacing:1px;color:#8b6914">BULLDOG INC.™</span>
          </div>
        </div>
      </div>
    </div>`;
}

/* ═══════════════════════════════════════════════════
   DOC PAGE EVENTS
═══════════════════════════════════════════════════ */
function attachDocPageEvents(){
  // No special attachment needed — all events are inline
}

/* ═══════════════════════════════════════════════════
   BDI GLOBAL ACTIONS
═══════════════════════════════════════════════════ */
window.BDI = {
  /* Questionnaire */
  updateQL(key, val){
    S.qLocal[key]=val;
  },
  togglePM(pm, checked){
    const cur=S.qLocal.paymentMethods||[];
    S.qLocal.paymentMethods=checked?[...cur,pm]:cur.filter(x=>x!==pm);
  },
  updateQItem(idx, field, val){
    S.qLocal.commonItems[idx][field]=val;
  },
  addQItem(){
    S.qLocal.commonItems=[...(S.qLocal.commonItems||[]),{name:'',price:''}];
    render();
  },
  removeQItem(idx){
    S.qLocal.commonItems=S.qLocal.commonItems.filter((_,i)=>i!==idx);
    render();
  },
  qNext(){
    const L=S.qLocal;
    S.profile={...S.profile,...L};
    if(S.qStep<3){
      S.qStep++;
      render();
    } else {
      S.profile.completed=true;
      saveProfile(S.profile);
      S.page='dashboard';
      S.qStep=0; S.qLocal=null;
      render();
    }
  },
  qBack(){
    S.qStep--;
    render();
  },

  /* Dashboard */
  openDoc(docId){
    S.docId=docId;
    S.doc=getDoc(docId);
    S.data=buildInitialState(S.doc, S.profile);
    S.page='doc';
    render();
  },
  editProfile(){
    S.qLocal={...S.profile};
    S.qStep=0;
    S.profile.completed=false;
    render();
  },
  backToDashboard(){
    S.page='dashboard';
    S.docId=null; S.doc=null; S.data=null;
    render();
  },

  /* Document form: field input */
  onFieldInput(el){
    const key=el.dataset.key;
    const val=el.value;
    if(!key) return;
    if(key.includes('.')){
      const [k1,k2]=key.split('.');
      if(!S.data[k1]) S.data[k1]={};
      S.data[k1][k2]=val;
    } else {
      S.data[key]=val;
    }
    updatePreview();
    // Also update totals preview if present
    if(['taxRate','discount'].includes(key)){
      const tp=document.getElementById('totals-preview');
      if(tp){
        const t=calcTotals(S.data);
        tp.innerHTML=`
          <div>Subtotal: <strong>${fmtMoney(t.subtotal)}</strong></div>
          ${parseFloat(S.data.taxRate)>0?`<div>Tax: <strong>${fmtMoney(t.taxAmt)}</strong></div>`:''}
          ${parseFloat(S.data.discount)>0?`<div>Discount: <strong>-${fmtMoney(t.discount)}</strong></div>`:''}
          <div class="total-line">TOTAL: <strong>${fmtMoney(t.total)}</strong></div>`;
      }
    }
  },

  /* Line items */
  updateItem(idx, field, val){
    S.data.items[idx][field]=val;
    updatePreview();
    const tp=document.getElementById('totals-preview');
    if(tp){
      const t=calcTotals(S.data);
      tp.innerHTML=`
        <div>Subtotal: <strong>${fmtMoney(t.subtotal)}</strong></div>
        ${parseFloat(S.data.taxRate)>0?`<div>Tax: <strong>${fmtMoney(t.taxAmt)}</strong></div>`:''}
        ${parseFloat(S.data.discount)>0?`<div>Discount: <strong>-${fmtMoney(t.discount)}</strong></div>`:''}
        <div class="total-line">TOTAL: <strong>${fmtMoney(t.total)}</strong></div>`;
    }
  },
  addItem(name, price){
    S.data.items=[...(S.data.items||[]),{description:name||'',qty:'1',price:price||''}];
    rerenderItemsList();
    updatePreview();
  },
  removeItem(idx){
    S.data.items=S.data.items.filter((_,i)=>i!==idx);
    rerenderItemsList();
    updatePreview();
  },

  /* Log entries */
  updateLogEntry(idx, col, val){
    S.data.logEntries[idx][col]=val;
    updatePreview();
  },
  addLogRow(){
    S.data.logEntries=[...(S.data.logEntries||[]),{c0:'',c1:'',c2:'',c3:'',c4:''}];
    rerenderLogList();
    updatePreview();
  },
  removeLogRow(idx){
    S.data.logEntries=S.data.logEntries.filter((_,i)=>i!==idx);
    rerenderLogList();
    updatePreview();
  },
};

function rerenderItemsList(){
  const el=document.getElementById('items-list');
  if(!el) return;
  el.innerHTML=(S.data.items||[]).map((it,i)=>`
    <div class="item-row">
      <input class="q-input" style="flex:3" value="${esc(it.description)}" placeholder="Item / service"
        oninput="BDI.updateItem(${i},'description',this.value)">
      <input class="q-input" style="flex:1" value="${esc(it.qty)}" type="number" min="1"
        oninput="BDI.updateItem(${i},'qty',this.value)">
      <input class="q-input" style="flex:1" value="${esc(it.price)}" type="number" step="0.01" placeholder="0.00"
        oninput="BDI.updateItem(${i},'price',this.value)">
      <button class="q-rm" onclick="BDI.removeItem(${i})">✕</button>
    </div>`).join('');
}

function rerenderLogList(){
  const el=document.getElementById('log-list');
  if(!el) return;
  const doc=S.doc;
  el.innerHTML=(S.data.logEntries||[]).map((row,i)=>`
    <div class="log-entry-row">
      <span class="log-row-num">${i+1}</span>
      ${[0,1,2,3,4].map(c=>`<input class="q-input log-cell" value="${esc(row['c'+c]||'')}"
        placeholder="${esc((doc.logColumns||[])[c]||'')}"
        oninput="BDI.updateLogEntry(${i},'c${c}',this.value)">`).join('')}
      <button class="q-rm" onclick="BDI.removeLogRow(${i})">✕</button>
    </div>`).join('');
}

/* ═══════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════ */
render();
</script>
